name: PackingWeightly
options:
  bundleIdPrefix: com.shimondeitel.packweight
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  PackingWeightly:
    type: application
    platform: iOS
    sources:
      - path: PackingWeightly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.packweight
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: PackingWeightly/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PackingWeightlyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PackingWeightlyTests
      - path: PackingWeightly.storekit
    dependencies:
      - target: PackingWeightly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.packweight.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PackingWeightlyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PackingWeightlyUITests
    dependencies:
      - target: PackingWeightly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.packweight.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  PackingWeightly:
    build:
      targets:
        PackingWeightly: all
        PackingWeightlyTests: [test]
        PackingWeightlyUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: PackingWeightly.storekit
    test:
      config: Debug
      storeKitConfiguration: PackingWeightly.storekit
      targets:
        - PackingWeightlyTests
        - PackingWeightlyUITests
    archive:
      config: Release
